<!DOCTYPE html>
<html>
<head>
  <title>Weekly Timetable</title>

  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #0b1d3a;
      margin: 0;
      padding: 20px;
      color: white;
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
    }

    .tabs {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding-bottom: 10px;
    }

    .tabs button {
      flex: 0 0 auto;
      padding: 12px 16px;
      border: none;
      border-radius: 20px;
      background: #142a5c;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .tabs button.active {
      background: #4c6fff;
    }

    .card {
      background: #142a5c;
      margin: 12px 0;
      padding: 15px;
      border-radius: 16px;
      text-align: left;
      position: relative;
      transition: 0.3s;
    }

    .card.current {
      border: 2px solid #4c6fff;
      transform: scale(1.02);
    }

    .shinchan {
      position: absolute;
      right: 10px;
      top: 10px;
      width: 60px;
    }

    .time {
      color: #cfd8ff;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h2>📅 Weekly Schedule</h2>

  <div class="tabs">
    <button onclick="showDay('mon', this)">Mon</button>
    <button onclick="showDay('tue', this)">Tue</button>
    <button onclick="showDay('wed', this)">Wed</button>
    <button onclick="showDay('thu', this)">Thu</button>
    <button onclick="showDay('fri', this)">Fri</button>
    <button onclick="showDay('sat', this)">Sat</button>
  </div>

  <div id="schedule"></div>

  <script>
    const data = {
      mon: [
        {time:"14:05", subject:"GE II", room:"T3-21", teacher:"DT"},
        {time:"15:05", subject:"EVS", room:"216", teacher:"-"}
      ],
      tue: [
        {time:"09:45", subject:"HRM Tutorial", room:"G1", teacher:"SC"},
        {time:"10:45", subject:"HRM", room:"G2", teacher:"SB"},
        {time:"14:05", subject:"DSC 2.1", room:"202", teacher:"DM"},
        {time:"15:05", subject:"DSC 2.2", room:"202", teacher:"SB"}
      ],
      wed: [
        {time:"08:45", subject:"GE II", room:"T3-21", teacher:"DT"},
        {time:"09:45", subject:"DSC 2.3", room:"202", teacher:"SB"},
        {time:"10:45", subject:"DSC 2.2", room:"219", teacher:"SB"}
      ],
      thu: [
        {time:"08:45", subject:"AEC", room:"202", teacher:"EVS"},
        {time:"09:45", subject:"DSC 2.3", room:"202", teacher:"SC"}
      ],
      fri: [
        {time:"08:45", subject:"DSC 2.1", room:"201", teacher:"DM"},
        {time:"11:45", subject:"DSC 2.2", room:"321", teacher:"SB"},
        {time:"14:05", subject:"GE II", room:"T3-01", teacher:"DT"}
      ],
      sat: [
        {time:"10:00", subject:"SEC", room:"-", teacher:"-"},
        {time:"12:00", subject:"VAC", room:"-", teacher:"-"}
      ]
    };

    function getCurrentTimeIST() {
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes();
    }

    function timeToMinutes(t) {
      const [h, m] = t.split(":").map(Number);
      return h * 60 + m;
    }

    function showDay(day, btn) {
      const container = document.getElementById("schedule");
      container.innerHTML = "";

      document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
      if (btn) btn.classList.add("active");

      const currentTime = getCurrentTimeIST();

      data[day].forEach(item => {
        const classTime = timeToMinutes(item.time);

        const isCurrent = Math.abs(currentTime - classTime) < 60;

        container.innerHTML += `
          <div class="card ${isCurrent ? 'current' : ''}">
            <h3>📘 ${item.subject}</h3>
            <p class="time">⏰ ${item.time}</p>
            <p>📍 Room ${item.room}</p>
            <p>👩‍🏫 ${item.teacher}</p>

            ${isCurrent ? `<img class="shinchan" src="https://media.tenor.com/6i7l1D9cZ4QAAAAi/shinchan.gif">` : ''}
          </div>
        `;
      });
    }

    // load Monday by default
    showDay('mon');
  </script>

</body>
</html>
